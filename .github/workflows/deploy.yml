name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npx vite build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Create .htaccess
        run: |
          echo 'RewriteEngine On' > dist/.htaccess
          echo 'RewriteBase /' >> dist/.htaccess
          echo 'RewriteCond %{REQUEST_FILENAME} !-f' >> dist/.htaccess
          echo 'RewriteCond %{REQUEST_FILENAME} !-d' >> dist/.htaccess
          echo 'RewriteRule ^ index.html [L]' >> dist/.htaccess
          echo '' >> dist/.htaccess
          echo '# Prevent caching of index.html so new deploys load immediately' >> dist/.htaccess
          echo '<Files "index.html">' >> dist/.htaccess
          echo '  Header set Cache-Control "no-cache, no-store, must-revalidate"' >> dist/.htaccess
          echo '  Header set Pragma "no-cache"' >> dist/.htaccess
          echo '  Header set Expires "0"' >> dist/.htaccess
          echo '</Files>' >> dist/.htaccess
          cat dist/.htaccess

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 62.72.62.61 >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Deploy to Hostinger
        run: |
          ssh -p 65002 u617589611@62.72.62.61 "rm -rf ~/domains/embaixadores.marciosager.com/public_html/assets ~/domains/embaixadores.marciosager.com/public_html/.htaccess"
          scp -P 65002 -r dist/* dist/.htaccess u617589611@62.72.62.61:~/domains/embaixadores.marciosager.com/public_html/
          echo "=== Verifying .htaccess on server ==="
          ssh -p 65002 u617589611@62.72.62.61 "cat ~/domains/embaixadores.marciosager.com/public_html/.htaccess"
          echo "=== Verifying static files ==="
          ssh -p 65002 u617589611@62.72.62.61 "ls -la ~/domains/embaixadores.marciosager.com/public_html/*.png ~/domains/embaixadores.marciosager.com/public_html/*.jpeg 2>/dev/null"
