name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npx vite build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Create .htaccess
        run: |
          cat > dist/.htaccess << 'EOF'
          RewriteEngine On
          RewriteBase /

          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.html [L]
          EOF

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 62.72.62.61 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Hostinger
        run: |
          ssh -p 65002 u617589611@62.72.62.61 "rm -rf ~/domains/embaixadores.marciosager.com/public_html/assets"
          scp -P 65002 dist/index.html dist/.htaccess u617589611@62.72.62.61:~/domains/embaixadores.marciosager.com/public_html/
          scp -P 65002 -r dist/assets u617589611@62.72.62.61:~/domains/embaixadores.marciosager.com/public_html/
